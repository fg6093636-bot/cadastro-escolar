<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
</head>
<body>

    <h2>Cadastro</h2>

    <form>

        <!-- Nome -->
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome"><br><br>

        <!-- Email -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <!-- Idade -->
        <label for="idade">Idade:</label><br>
        <input type="number" id="idade" name="idade"><br><br>

        <!-- Data de nascimento -->
        <label for="data">Data de nascimento:</label><br>
        <input type="date" id="data" name="data"><br><br>

        <!-- Senha -->
        <label for="senha">Senha:</label><br>
        <input type="password" id="senha" name="senha"><br><br>

        <!-- Hobbies -->
        <p>Hobbies:</p>
        <input type="checkbox" id="futebol" name="hobby">
        <label for="futebol">Futebol</label><br>

        <input type="checkbox" id="musica" name="hobby">
        <label for="musica">Música</label><br>

        <input type="checkbox" id="jogos" name="hobby">
        <label for="jogos">Jogos</label><br><br>

        <!-- Turno -->
        <p>Turno de estudo:</p>
        <input type="radio" id="manha" name="turno">
        <label for="manha">Manhã</label><br>

        <input type="radio" id="tarde" name="turno">
        <label for="tarde">Tarde</label><br>

        <input type="radio" id="noite" name="turno">
        <label for="noite">Noite</label><br><br>

        <!-- Botões -->
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">

    </form>

</body>
</html>
